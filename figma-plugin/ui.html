<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HitPay Pages Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px; color: #1a1a1a; background: #fff; padding: 16px;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 12px; }
    .controls { display: flex; gap: 12px; margin-bottom: 10px; }
    .controls a { font-size: 12px; color: #4f46e5; cursor: pointer; text-decoration: underline; }
    .section-label {
      font-size: 10px; font-weight: 600; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin: 12px 0 6px;
    }
    .page-list { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .page-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 8px; border-radius: 5px; cursor: pointer; user-select: none;
    }
    .page-item:hover { background: #f5f5f5; }
    .page-item input[type="checkbox"] { cursor: pointer; accent-color: #4f46e5; width: 13px; height: 13px; flex-shrink: 0; }
    .page-item label { cursor: pointer; font-size: 12px; }
    .divider { height: 1px; background: #eee; margin: 10px 0; }
    .actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-ghost {
      flex: 1; padding: 8px; border: 1px solid #ddd; background: #fff;
      border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; color: #333;
    }
    .btn-ghost:hover { background: #f5f5f5; }
    .btn-primary {
      flex: 2; padding: 8px; background: #4f46e5; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .btn-primary:hover { background: #4338ca; }
    .count { font-size: 11px; color: #888; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h1>HitPay Landing Pages</h1>
  <p class="subtitle">Select pages to generate as Figma frames at 1440px</p>

  <div class="controls">
    <a id="selectAll">Select all</a>
    <a id="deselectAll">Deselect all</a>
  </div>

  <p class="section-label">Original Pages</p>
  <div class="page-list" id="originalPages"></div>

  <div class="divider"></div>

  <p class="section-label">Industry Pages</p>
  <div class="page-list" id="industryPages"></div>

  <div class="divider"></div>

  <p class="section-label">Partnership Pages</p>
  <div class="page-list" id="partnershipPages"></div>

  <p class="count" id="count"></p>

  <div class="actions">
    <button class="btn-ghost" id="cancelBtn">Cancel</button>
    <button class="btn-primary" id="generateBtn">Generate selected</button>
  </div>

  <script>
    const PAGES = {
      original: [
        { id: 'ecommerce',     label: '🛒 E-commerce' },
        { id: 'retail',        label: '🏪 Retail' },
        { id: 'nonprofits',    label: '💜 Nonprofits' },
        { id: 'landing',       label: '🏠 General Landing' },
        { id: 'landing_plain', label: '✨ Landing (Plain)' },
      ],
      industry: [
        { id: 'restaurants', label: '🍽️ Restaurants' },
        { id: 'beauty',      label: '💅 Beauty & Wellness' },
        { id: 'fitness',     label: '💪 Fitness & Gyms' },
        { id: 'education',   label: '📚 Education' },
        { id: 'travel',      label: '✈️ Travel' },
        { id: 'furniture',   label: '🛋️ Furniture' },
        { id: 'computers',   label: '💻 Computers & Tech' },
        { id: 'events',      label: '🎪 Events' },
        { id: 'wholesale',   label: '📦 Wholesale' },
      ],
      partnership: [
        { id: 'art_craft_fair', label: '🎨 Art & Craft Fair SG 2026' },
      ]
    };

    function createCheckbox(page, container) {
      const div = document.createElement('div');
      div.className = 'page-item';
      div.innerHTML = `<input type="checkbox" id="${page.id}" name="${page.id}" checked><label for="${page.id}">${page.label}</label>`;
      container.appendChild(div);
    }

    PAGES.original.forEach(p => createCheckbox(p, document.getElementById('originalPages')));
    PAGES.industry.forEach(p => createCheckbox(p, document.getElementById('industryPages')));
    PAGES.partnership.forEach(p => createCheckbox(p, document.getElementById('partnershipPages')));

    function getAllCheckboxes() {
      return document.querySelectorAll('input[type="checkbox"]');
    }

    function updateCount() {
      const n = Array.from(getAllCheckboxes()).filter(cb => cb.checked).length;
      document.getElementById('count').textContent = n === 0 ? 'No pages selected' : `${n} page${n > 1 ? 's' : ''} selected`;
    }

    getAllCheckboxes().forEach(cb => cb.addEventListener('change', updateCount));
    updateCount();

    document.getElementById('selectAll').addEventListener('click', () => {
      getAllCheckboxes().forEach(cb => cb.checked = true);
      updateCount();
    });

    document.getElementById('deselectAll').addEventListener('click', () => {
      getAllCheckboxes().forEach(cb => cb.checked = false);
      updateCount();
    });

    document.getElementById('generateBtn').addEventListener('click', () => {
      const selected = Array.from(getAllCheckboxes())
        .filter(cb => cb.checked)
        .map(cb => cb.name);
      if (selected.length === 0) return;
      parent.postMessage({ pluginMessage: { type: 'generate', pages: selected } }, '*');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });
  </script>
</body>
</html>
